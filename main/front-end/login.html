<!DOCTYPE html>

<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="./img/iconesenai.png" type="image/x-icon" />
  </head>
  <body>
    <header>
      <div class="botao-cadastre-se-login">
        <button onclick="window.location.href='./cadastro.html'">
          cadastre-se
        </button>
      </div>
      <div class="botao-inicial-login">
        <button onclick="window.location.href='./inicial.html'">inicial</button>
      </div>
    </header>
    <main>
      <section id="login">
        <div class="logo">
          <img src="./img/logo.png" alt="logo SENAI SP" />
        </div>
        <form id="formulario-login">
          <div class="usuario">
            <label for="usuario"></label>
            <input type="text" id="usuario" placeholder="usuario" required />
          </div>
          <div class="senha">
            <label for="senha"></label>
            <input type="password" id="senha" placeholder=" senha" required />
          </div>
          <div class="botoes">
            <div class="login">
              <input type="submit" value="Login" />
            </div>
            <div class="cadastre-se">
              <input type="submit" value="Cadastre-se" />
            </div>
          </div>
        </form>
      </section>
    </main>
    <footer>
      <div class="desenvolvido">
        <p>
          &copy; Desenvolvido por: Vinicius Fogaça, Maria Júlia e Maria Clara
        </p>
      </div>
    </footer>
  </body>
</html>
